name: Stellar Build
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Rust
        run: rustup update stable && rustup target add wasm32-unknown-unknown
      - name: Build Contract
        run: cargo build --target wasm32-unknown-unknown --release
